async function ensureCusdis(){
  if(!CFG.commentAppId)return;
  if(window.CUSDIS&&typeof window.CUSDIS.initial==='function')return;
  if(cusdisScriptPromise)return cusdisScriptPromise;
  cusdisScriptPromise=new Promise((resolve,reject)=>{
    const fail=()=>{cusdisScriptPromise=null;reject(Error('Failed to load Cusdis comments.'))};
    const existing=document.querySelector('script[data-cusdis-script="1"]');
    if(existing){
      if(existing.dataset.loaded==='1'){resolve();return}
      existing.addEventListener('load',resolve,{once:true});
      existing.addEventListener('error',fail,{once:true});
      return;
    }
    const s=document.createElement('script');
    s.async=true;
    s.defer=true;
    s.src=CFG.commentScript;
    s.dataset.cusdisScript='1';
    s.addEventListener('load',()=>{s.dataset.loaded='1';resolve()},{once:true});
    s.addEventListener('error',fail,{once:true});
    document.body.appendChild(s);
  });
  return cusdisScriptPromise;
}

}
async function rssXML(){const ps=S.posts.slice(0,CFG.rssItems);await ensureEx(ps);const base=baseUrl(),ch=base?base+'/#/':'#/';const items=[];for(const p of ps){let x=null;try{x=await loadPost(p)}catch{}const title=x?x.title:p.title,desc=x?x.excerpt:(p.excerpt||''),link=base?`${base}/#/post/${encodeURIComponent(p.slug)}`:ph(p.slug),pub=(x?x.dateObj:p.dateObj).toUTCString();let content='';if(CFG.rssFull&&x&&x.html)content=`<content:encoded><![CDATA[${x.html.replace(/]]>/g,']]]]><![CDATA[>')}]]></content:encoded>`;items.push(`<item><title>${xesc(title)}</title><link>${xesc(link)}</link><guid>${xesc(link)}</guid><pubDate>${xesc(pub)}</pubDate><description>${xesc(desc)}</description>${content}</item>`)}
  return `<?xml version="1.0" encoding="UTF-8"?><rss version="2.0" xmlns:content="http://purl.org/rss/1.0/modules/content/"><channel><title>${xesc(CFG.siteTitle)}</title><link>${xesc(ch)}</link><description>${xesc(CFG.siteDescription)}</description><lastBuildDate>${xesc(new Date().toUTCString())}</lastBuildDate>${items.join('')}</channel></rss>`
}
async function feedExport(){const xml=await rssXML();if(S.feedUrl){URL.revokeObjectURL(S.feedUrl);S.feedUrl=null}S.feedUrl=URL.createObjectURL(new Blob([xml],{type:'application/rss+xml;charset=utf-8'}));const hint=baseUrl()?'<p>The public site feed should live at <code>/feed.xml</code>. Use this page only as a fallback export tool if you need to rebuild it manually in the browser.</p>':'<p>When opened locally, this can still export a portable <code>feed.xml</code> file as a fallback.</p>';
  setMain(`<section><h1>RSS Export</h1>${hint}<p><a href="${feedHref()}">Open published feed.xml</a></p><p><a href="${S.feedUrl}" download="feed.xml">Download generated feed.xml</a></p></section>`,'Feed export')}
function notFound(){setMain('<section class="box err"><h1>Not found</h1><p>The requested route does not exist.</p></section>','Not Found')}
async function run(){const r=route(),s=r.seg[0]||'';if(!s)return home(r.q);if(s==='post')return post(r.seg[1]);if(s==='page')return page(r.seg[1]);if(s==='pages')return pages();if(s==='archive'){if(!r.seg[1])return arch();if(!r.seg[2])return archYear(r.seg[1]);return archMonth(r.seg[1],r.seg[2])}if(s==='tags')return tags();if(s==='tag')return tag(r.seg[1]);if(s==='authors')return authors();if(s==='author')return author(r.seg[1]);if(s==='search')return search(r.q);if(s==='feed.xml'||s==='feed'){location.replace(feedHref());return}if(s==='feed-export')return feedExport();return notFound()}
function applyTheme(v){const pref=['light','dark','auto'].includes(v)?v:'auto';localStorage.setItem('portable-blog-theme',pref);const eff=pref==='auto'?(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'):pref;document.documentElement.setAttribute('data-theme',eff);if(CFG.themeToggle){const next=pref==='light'?'dark':pref==='dark'?'auto':'light';D.theme.textContent='Theme: '+pref[0].toUpperCase()+pref.slice(1);D.theme.dataset.next=next;D.theme.hidden=false}else D.theme.hidden=true}
function showLocal(msg){if(location.protocol!=='file:')return;D.local.hidden=false;D.localMsg.textContent=msg}function hideLocal(){D.local.hidden=true}
async function initFetch(){await loadManifests();hideLocal();drawNav();await run()}
async function localPick(ev){const fs=[...(ev.target.files||[])];if(!fs.length)return;const m=new Map();for(const f of fs)regLocal(m,f.webkitRelativePath||f.name,f);S.local=m;try{await loadManifests();hideLocal();drawNav();await run()}catch(e){setMain(`<section class="box err"><h1>Local folder loaded, but manifests were not found</h1><p>Expected <code>${esc(CFG.postsManifest)}</code> and <code>${esc(CFG.pagesManifest)}</code> inside the selected folder.</p><p>${esc(e.message)}</p></section>`,'Error');showLocal('Select the folder that directly contains posts/, pages/, and index.html.')}}
function bind(){addEventListener('hashchange',()=>run().catch(e=>setMain(`<section class="box err"><h1>Routing error</h1><p>${esc(e.message)}</p></section>`,'Error')));
  D.form.addEventListener('submit',e=>{e.preventDefault();const v=D.q.value.trim();location.hash=v?`#/search?q=${encodeURIComponent(v)}`:'#/search'});
  D.theme.addEventListener('click',()=>applyTheme(D.theme.dataset.next||'auto'));
  if(window.matchMedia)window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',()=>{if((localStorage.getItem('portable-blog-theme')||'auto')==='auto')applyTheme('auto')});
  D.pick.addEventListener('click',()=>D.dir.click());D.dir.addEventListener('change',e=>localPick(e).catch(er=>setMain(`<section class="box err"><h1>Local folder error</h1><p>${esc(er.message)}</p></section>`,'Error')))
}
async function init(){D.title.textContent=CFG.siteTitle;D.desc.textContent=CFG.siteDescription;D.foot.textContent='All trademarks and copyrighted material belong to their respective owners.';bind();applyTheme(localStorage.getItem('portable-blog-theme')||'auto');drawNav();setMain('<section><h1>Loading...</h1><p>Reading manifests and content files.</p></section>','Loading');
  try{await initFetch()}catch(e){const hint='Your browser may block local file reads from file://. Select the blog folder to continue, or run a tiny static server.';if(location.protocol==='file:'){showLocal(hint);setMain(`<section><h1>Local mode</h1><p class="box">${esc(hint)}</p></section>`,'Local Mode')}else setMain(`<section class="box err"><h1>Failed to load manifests</h1><p>${esc(e.message)}</p></section>`,'Error')}}
init();
})();
</script>
</body>
